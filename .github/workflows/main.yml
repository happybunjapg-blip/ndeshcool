name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build APK
        run: |
          yes | flet build apk --clear-cache \
            --exclude .git \
            --exclude .venv \
            --exclude .github \
            --exclude tests \
            --exclude __pycache__ \
            --exclude requirements.txt.save

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ndeshcool-apk
          path: build/apk/*.apk
